<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap"
    rel="stylesheet">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/styles.css">



  <title>Frontend Mentor | Product preview card component</title>
</head>

<body>

  <div class="center">
    <main class="container">

      <section class="container__product-image">
        <img src="./images/image-product-desktop.jpg" alt="Perfume bottle">
      </section>

      <section class="container__product-content">
        <h3 class="product-category">
          Perfume
        </h3>

        <h1 class="product-name">
          Gabrielle Essence Eau De Parfum
        </h1>

        <p class="product-details">
          A floral, solar and voluptuous interpretation composed by Olivier Polge,
          Perfumer-Creator for the House of CHANEL.
        </p>

        <div class="container-product--price">
          <h2 class="product-price">
            $149.99
          </h2>

          <h3 class="product-price--discounted">
            $169.99
          </h3>
        </div>

        <button class="product-add-cart">Add to Cart</button>
      </section>
    </main>
  </div>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>

</html>
